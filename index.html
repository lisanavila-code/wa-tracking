<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hablar por WhatsApp - Yin Yang Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #075E54 0%, #128C7E 50%, #25D366 100%);
    padding: 24px 16px;
  }
  .card {
    background: white; border-radius: 24px; padding: 40px 28px;
    max-width: 400px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .icon {
    width: 72px; height: 72px; border-radius: 50%; background: #25D366;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .icon svg { width: 36px; height: 36px; fill: white; }
  h1 { font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 6px; }
  .person-name { font-weight: 700; color: #128C7E; }
  .hint { font-size: 13px; color: #999; margin-bottom: 28px; }
  .wa-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px 24px; background: #25D366; color: white;
    border: none; border-radius: 14px; font-size: 17px; font-weight: 700;
    cursor: pointer; text-decoration: none; transition: transform 0.15s;
  }
  .wa-btn:hover { transform: scale(1.03); }
  .wa-btn svg { width: 28px; height: 28px; fill: white; }
  .footer { margin-top: 20px; font-size: 11px; color: #bbb; }
  .error { color: #e74c3c; font-size: 14px; margin-bottom: 20px; }
  .loading { color: #888; font-size: 16px; }
</style>

<!-- Google Analytics — reemplazar G-XXXXXXXXXX por tu ID real -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CJB9SDKJ2Z"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CJB9SDKJ2Z');
</script>

</head>
<body>

<div class="card" id="card">
  <p class="loading" id="loading">Cargando...</p>
</div>

<script>
const PHONE = "5492229512964";

const PROFILES = {
  cris: {
    name: "Cris",
    messages: {
      youtube: "Hola Cris! Me encantó tu contenido de YouTube y me gustaría que me ayudes 1:1 a mejorar mi vida social y amorosa. Te puedo contar de mí?",
      tiktok: "Hola Cris! Vengo de TikTok, me gustaría que me des una mano con mis habilidades sociales. Te puedo contar de mi? Mi nombre es"
    }
  },
  paul: {
    name: "Paul",
    messages: {
      youtube: "Hola Paul, estuve viendo tu contenido de YouTube y me gustaría que me ayudes 1:1 a mejorar mi vida social. Te puedo contar de mí? Mi nombre es",
      tiktok: "Hola Paul, estuve viendo tu contenido de TikTok y me gustaría que me ayudes 1:1 a mejorar mi vida social. Te puedo contar de mí? Mi nombre es"
    }
  }
};

const PLATFORM_LABELS = { youtube: "YouTube", tiktok: "TikTok" };

function init() {
  const params = new URLSearchParams(window.location.search);
  const path = window.location.pathname;

  // Get profile from path: /wa/cris or /wa/paul
  let profile = null;
  if (path.includes("/wa/cris")) profile = "cris";
  else if (path.includes("/wa/paul")) profile = "paul";

  const source = params.get("utm_source") || "youtube";
  const content = params.get("utm_content") || "";

  if (!profile || !PROFILES[profile]) {
    document.getElementById("card").innerHTML = '<p class="error">Link inválido. Contactanos directamente.</p>';
    return;
  }

  const p = PROFILES[profile];
  const message = p.messages[source] || p.messages.youtube;
  const platformLabel = PLATFORM_LABELS[source] || source;
  const waLink = "https://wa.me/" + PHONE + "?text=" + encodeURIComponent(message);

  // Track event in Google Analytics
  if (typeof gtag === "function") {
    gtag("event", "wa_click_view", {
      event_category: "whatsapp",
      event_label: content || "direct",
      profile: profile,
      platform: source,
      video: content
    });
  }

  document.getElementById("card").innerHTML = `
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <h1>¡Hablemos por WhatsApp!</h1>
    <p class="subtitle">Estás por hablar con <span class="person-name">${p.name}</span></p>
    <p class="hint">Tocá el botón para iniciar la conversación</p>
    <a href="${waLink}" class="wa-btn" id="wa-btn">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Abrir WhatsApp
    </a>
    <p class="footer">Se abrirá WhatsApp con un mensaje listo para enviar</p>
  `;

  // Track actual click on WhatsApp button
  document.getElementById("wa-btn").addEventListener("click", function() {
    if (typeof gtag === "function") {
      gtag("event", "wa_click_open", {
        event_category: "whatsapp",
        event_label: content || "direct",
        profile: profile,
        platform: source,
        video: content
      });
    }
  });
}

init();
</script>

</body>
</html>
